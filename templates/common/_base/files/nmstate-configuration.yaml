mode: 0755
path: "/usr/local/bin/nmstate-configuration.sh"
contents:
  inline: |
    #!/bin/bash
    set -eux

    if [ -e /etc/nmstate/applied ]; then
      # Already done, don't apply again
      exit 0
    fi

    hostname=$(hostname -s)
    hostname_file="/etc/nmstate/${hostname}.yaml"
    cluster_file="/etc/nmstate/cluster.yaml"
    config_file=""
    if [ -s $hostname_file ]; then
      config_file=$hostname_file
    fi
    if [ -s $cluster_file ]; then
      config_file=$cluster_file
    fi
    if [ -z $config_file ]; then
      # No config to apply
      exit 0
    fi

    until /bin/nmstatectl apply $config_file
    do
      echo "Failed to apply NMState configuration from $config_file. Retrying in 60 seconds."
      sleep 60
    done
    touch /etc/nmstate/applied
