mode: 0744
path: "/etc/NetworkManager/dispatcher.d/99-bond-esp-offload"
contents:
    inline: |
      #!/bin/bash

      # Bonds in active-backup mode have ESP offloads enabled even if the
      # underlying links don't support it. This tricks libreswan with a default
      # config of 'nic-offload=auto' to load the esp_offload kernel module. This
      # kernel module does not play nice with OVS. This script disables bond ESP
      # offloads if the underlying links don't support it. Depends on ipsec
      # service drop-in to start it after configure-ovs to make sure offloads
      # are disabled before ipsec starts.
      # https://issues.redhat.com/browse/RHEL-58811

      if [[ "$2" != "up" ]]; then
        exit
      fi

      function disable_bond_esp_offload() {
        local master=$1
        local slave=$2
        for feature in tx-esp-segmentation esp-hw-offload esp-tx-csum-hw-offload; do
          if ethtool -k "$master" | grep -qE "^${feature}: off"; then
            # already disabled, nothing to do
            continue
          fi
          if ! ethtool -k "$slave" | grep -qE "^${feature}: off"; then
            # enabled in slave, nothing to do
            continue
          fi
          logger -t bond-esp-offload -s "Bond link $slave has $feature off, setting master $master $feature off"
          ethtool -K "$master" "$feature" off
        done
      }

      device=$DEVICE_IFACE
      kind=$(ip -j -d link show "$device" | jq -r '.[0] | .linkinfo.info_kind // empty')
      kind_slave=$(ip -j -d link show "$device" | jq -r '.[0] | .linkinfo.info_slave_kind // empty')

      if [ "$kind" = "bond" ]; then
        for slave in $(ip -j -d link show | jq -r '.[] | select(.master=="'"$device"'") | .ifname // empty'); do
          disable_bond_esp_offload "$device" "$slave"
        done
      fi

      if [ "$kind_slave" = "bond" ]; then
        master=$(ip -j -d link show "$device" | jq -r '.[0] | .master // empty')
        disable_bond_esp_offload "$master" "$device"
      fi
