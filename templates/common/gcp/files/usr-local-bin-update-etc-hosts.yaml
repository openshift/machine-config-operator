mode: 0755
path: "/usr/local/bin/update-etc-hosts"
contents:
  inline: |
    #!/bin/bash
    etc_hosts_config_filename="/etc/conf.d/etc-hosts.conf"
    if [ ! -f "$etc_hosts_config_filename" ]; then
      exit 0
    fi
    cat /etc/conf.d/etc-hosts.conf >> /etc/hosts
    echo "Done updating /etc/hosts"
