mode: 0755
path: "/usr/local/bin/taint-fenced-node.sh"
contents:
  inline: |
    #!/bin/bash
    set -euo pipefail
    FENCED_NODE="$1"
    KUBECONFIG="/etc/kubernetes/static-pod-resources/kube-apiserver-certs/secrets/node-kubeconfigs/localhost.kubeconfig"
    TAINT_KEY="node.kubernetes.io/out-of-service"
    TAINT_VALUE="nodeshutdown"
    ANNOTATION_KEY="node.kubernetes.io/out-of-service-applied-by"
    ANNOTATION_VALUE="pacemaker"
    OC="oc --kubeconfig=$KUBECONFIG"

    if [[ ! "$FENCED_NODE" =~ ^[a-z0-9]([a-z0-9.-]*[a-z0-9])?$ ]]; then
        logger -t taint-fenced-node "ERROR: Invalid or empty node name: '${FENCED_NODE:-}'"
        exit 1
    fi

    logger -t taint-fenced-node "Waiting for API server to taint fenced node ${FENCED_NODE}"

    # Phase 1: wait for API server to become writable (etcd quorum recovery)
    # Read-only checks (oc get nodes) can pass from kube-apiserver watch cache
    # before etcd is fully writable. Use a write probe to confirm writes work.
    until $OC annotate node "$(hostname)" --overwrite tnf-taint-probe="" &>/dev/null; do
        sleep 5
    done

    # Phase 2: verify the fenced node exists
    if ! $OC get node "$FENCED_NODE" &>/dev/null; then
        logger -t taint-fenced-node "ERROR: Node ${FENCED_NODE} not found in cluster - name mismatch?"
        exit 1
    fi

    logger -t taint-fenced-node "API server responsive, applying annotation and taint to ${FENCED_NODE}"

    # Apply annotation + taint atomically via a single strategic-merge patch.
    PATCH=$(cat <<PATCHEOF
    {"metadata":{"annotations":{"${ANNOTATION_KEY}":"${ANNOTATION_VALUE}"}},
     "spec":{"taints":[{"key":"${TAINT_KEY}","value":"${TAINT_VALUE}","effect":"NoExecute"}]}}
    PATCHEOF
    )

    MAX_RETRIES=12
    RETRY_INTERVAL=5
    for attempt in $(seq 1 $MAX_RETRIES); do
        if $OC patch node "$FENCED_NODE" --type=strategic -p "$PATCH" 2>/dev/null; then
            logger -t taint-fenced-node "Successfully tainted and annotated ${FENCED_NODE}"
            exit 0
        fi

        logger -t taint-fenced-node "Attempt ${attempt}/${MAX_RETRIES} failed, retrying in ${RETRY_INTERVAL}s"
        sleep $RETRY_INTERVAL
    done

    logger -t taint-fenced-node "ERROR: Failed to taint ${FENCED_NODE} after ${MAX_RETRIES} attempts"
    exit 1
