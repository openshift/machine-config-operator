mode: 0644
path: {{ if isBGPVIPManagement . }}"/etc/kubernetes/manifests/0000-frr-k8s.yaml"{{ else }}"/etc/kubernetes/disabled-manifests/0000-frr-k8s.yaml"{{ end }}
contents:
  inline: |
    ---
    kind: Pod
    apiVersion: v1
    metadata:
      name: frr-k8s
      namespace: openshift-frr-k8s
      labels:
        app: frr-k8s
    spec:
      # hostNetwork: the BGP session must originate from the node IP and the
      # advertised VIP routes live in the host routing table (keepalived parity).
      hostNetwork: true
      shareProcessNamespace: true
      priorityClassName: system-node-critical
      # 10s (not the upstream DaemonSet's 0): a SIGTERM'd bgpd sends a Cease
      # NOTIFICATION, which hard-resets the session; after a SIGKILL a peer
      # in graceful-restart helper mode may retain stale VIP routes on bare
      # TCP loss until the restart timer expires.
      terminationGracePeriodSeconds: 10
      tolerations:
      - operator: Exists
      initContainers:
      - name: render-config-frr
        image: {{.Images.baremetalRuntimeCfgImage}}
        command:
        - /usr/bin/runtimecfg
        - render
        - /etc/kubernetes/kubeconfig
        - --api-vips
        - {{ onPremPlatformAPIServerInternalIP . }}
        - --ingress-vips
        - {{ onPremPlatformIngressIP . }}
        - /config/frr.conf.tmpl
        - --out-dir
        - /etc/frr
        - --peer-file
        - /config/frr-peers.json
        env:
        - name: IS_BOOTSTRAP
          value: "no"
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 50Mi
          limits:
            cpu: 100m
            memory: 128Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: resource-dir
          mountPath: /config
          readOnly: true
        - name: frr-conf
          mountPath: /etc/frr
        - name: kubeconfig
          mountPath: /etc/kubernetes
          readOnly: true
      - name: cp-frr-files
        image: {{.Images.frrK8sImage}}
        command:
        - /bin/sh
        - -c
        - |
          set -eu
          cp -f /tmp/frr/daemons /etc/frr/daemons
          cp -f /tmp/frr/vtysh.conf /etc/frr/vtysh.conf
        securityContext:
          runAsUser: 100
          runAsGroup: 101
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 20Mi
          limits:
            cpu: 100m
            memory: 128Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: frr-startup
          mountPath: /tmp/frr
          readOnly: true
        - name: frr-conf
          mountPath: /etc/frr
      - name: cp-reloader
        image: {{.Images.frrK8sImage}}
        command:
        - /bin/sh
        - -c
        - cp -f /frr-reloader.sh /etc/frr_reloader/
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 20Mi
          limits:
            cpu: 100m
            memory: 128Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: reloader
          mountPath: /etc/frr_reloader
      - name: cp-frr-status
        image: {{.Images.frrK8sImage}}
        command:
        - /bin/sh
        - -c
        - cp -f /frr-status /etc/frr_status/
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        resources:
          requests:
            cpu: 10m
            memory: 20Mi
          limits:
            cpu: 100m
            memory: 128Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: frr-status
          mountPath: /etc/frr_status
      containers:
      - name: controller
        image: {{.Images.frrK8sImage}}
        command:
        - /frr-k8s
        args:
        - --node-name=$(NODE_NAME)
        - --namespace=openshift-frr-k8s
        env:
        - name: FRR_CONFIG_FILE
          value: /etc/frr_reloader/frr.conf
        - name: FRR_RELOADER_PID_FILE
          value: /etc/frr_reloader/reloader.pid
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: KUBECONFIG
          value: /etc/kubernetes/kubeconfig
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
            add:
            - NET_RAW
        livenessProbe:
          httpGet:
            path: /healthz
            port: 7572
            host: 127.0.0.1
          initialDelaySeconds: 10
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /readyz
            port: 7572
            host: 127.0.0.1
          initialDelaySeconds: 10
          periodSeconds: 10
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: reloader
          mountPath: /etc/frr_reloader
        - name: kubeconfig
          mountPath: /etc/kubernetes
          readOnly: true
      - name: frr
        image: {{.Images.frrK8sImage}}
        command:
        - /bin/sh
        - -c
        - /sbin/tini -- /usr/lib/frr/docker-start
        env:
        - name: TINI_SUBREAPER
          value: "true"
        resources:
          requests:
            cpu: 100m
            memory: 200Mi
          limits:
            cpu: 500m
            memory: 512Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            # Mirrors the frr container of the frr-k8s DaemonSet shipped by
            # CNO (upstream metallb/frr-k8s parity). No drop ALL: FRR's
            # privilege-separated startup (watchfrr as root spawning daemons
            # as the frr user) additionally relies on root's implicit
            # capabilities (SETUID/SETGID/DAC_OVERRIDE/CHOWN); dropping ALL
            # and re-adding only the network capabilities was tested and
            # prevents the FRR daemons from starting. SYS_ADMIN is required
            # by docker-start/watchfrr process supervision.
            add:
            - NET_ADMIN
            - NET_RAW
            - SYS_ADMIN
            - NET_BIND_SERVICE
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: frr-sockets
          mountPath: /var/run/frr
        - name: frr-conf
          mountPath: /etc/frr
        - name: frr-lib
          mountPath: /var/lib/frr
        - name: frr-tmp
          mountPath: /var/tmp/frr
      - name: reloader
        image: {{.Images.frrK8sImage}}
        command:
        - /etc/frr_reloader/frr-reloader.sh
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
            # vtysh as root against the frr-user-owned vty sockets.
            add:
            - DAC_OVERRIDE
        resources:
          requests:
            cpu: 10m
            memory: 20Mi
          limits:
            cpu: 500m
            memory: 128Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: frr-sockets
          mountPath: /var/run/frr
        - name: frr-conf
          mountPath: /etc/frr
        - name: reloader
          mountPath: /etc/frr_reloader
      - name: frr-status
        image: {{.Images.frrK8sImage}}
        command:
        - /etc/frr_status/frr-status
        args:
        - --node-name=$(NODE_NAME)
        - --namespace=openshift-frr-k8s
        - --pod-name=frr-k8s-$(NODE_NAME)
        env:
        - name: NODE_NAME
          valueFrom:
            fieldRef:
              fieldPath: spec.nodeName
        - name: KUBECONFIG
          value: /etc/kubernetes/kubeconfig
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
            # vtysh as root against the frr-user-owned vty sockets.
            add:
            - DAC_OVERRIDE
        resources:
          requests:
            cpu: 10m
            memory: 20Mi
          limits:
            cpu: 500m
            memory: 128Mi
        terminationMessagePolicy: FallbackToLogsOnError
        volumeMounts:
        - name: frr-sockets
          mountPath: /var/run/frr
        - name: frr-conf
          mountPath: /etc/frr
        - name: frr-status
          mountPath: /etc/frr_status
        - name: kubeconfig
          mountPath: /etc/kubernetes
          readOnly: true
      volumes:
      - name: resource-dir
        hostPath:
          path: /etc/kubernetes/static-pod-resources/frr-k8s
      # hostPath (not emptyDir) so the CNO-managed metrics companion
      # DaemonSet can reach the FRR sockets; perms via tmpfiles.d.
      - name: frr-conf
        hostPath:
          path: /run/frr-k8s/conf
          type: DirectoryOrCreate
      - name: frr-sockets
        hostPath:
          path: /run/frr-k8s/sockets
          type: DirectoryOrCreate
      - name: reloader
        emptyDir: {}
      - name: frr-status
        emptyDir: {}
      - name: frr-lib
        emptyDir: {}
      - name: frr-tmp
        emptyDir: {}
      - name: frr-startup
        hostPath:
          path: /etc/kubernetes/static-pod-resources/frr-k8s/startup
      - name: kubeconfig
        hostPath:
          path: /etc/kubernetes
