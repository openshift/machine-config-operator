apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.openshift.io: https://github.com/openshift/api/pull/475
    api.openshift.io/merged-by-featuregates: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: TechPreviewNoUpgrade
  name: authentications.operator.openshift.io
spec:
  group: operator.openshift.io
  names:
    kind: Authentication
    listKind: AuthenticationList
    plural: authentications
    singular: authentication
  scope: Cluster
  versions:
  - name: v1
    schema:
      openAPIV3Schema:
        description: |-
          Authentication provides information to configure an operator to manage authentication.

          Compatibility level 1: Stable within a major release for a minimum of 12 months or 3 minor releases (whichever is longer).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            properties:
              logLevel:
                default: Normal
                description: |-
                  logLevel is an intent based logging for an overall component.  It does not give fine grained control, but it is a
                  simple way to manage coarse grained logging choices that operators have to interpret for their operands.

                  Valid values are: "Normal", "Debug", "Trace", "TraceAll".
                  Defaults to "Normal".
                enum:
                - ""
                - Normal
                - Debug
                - Trace
                - TraceAll
                type: string
              managementState:
                description: managementState indicates whether and how the operator
                  should manage the component
                pattern: ^(Managed|Unmanaged|Force|Removed)$
                type: string
              observedConfig:
                description: |-
                  observedConfig holds a sparse config that controller has observed from the cluster state.  It exists in spec because
                  it is an input to the level for the operator
                nullable: true
                type: object
                x-kubernetes-preserve-unknown-fields: true
              operatorLogLevel:
                default: Normal
                description: |-
                  operatorLogLevel is an intent based logging for the operator itself.  It does not give fine grained control, but it is a
                  simple way to manage coarse grained logging choices that operators have to interpret for themselves.

                  Valid values are: "Normal", "Debug", "Trace", "TraceAll".
                  Defaults to "Normal".
                enum:
                - ""
                - Normal
                - Debug
                - Trace
                - TraceAll
                type: string
              proxy:
                description: |-
                  proxy configures proxy settings for outbound connections made
                  by the authentication stack. When set, it replaces the
                  cluster-wide proxy (proxy.config.openshift.io/cluster)
                  entirely for authentication — individual fields are not
                  inherited from the cluster-wide configuration. When omitted,
                  the cluster-wide proxy is used if configured; otherwise no
                  proxy is used.
                minProperties: 1
                properties:
                  httpProxy:
                    description: |-
                      httpProxy is the URL of the proxy for HTTP requests.
                      Must be a valid URL with http or https scheme, a non-empty
                      hostname, and no path, query parameters, or fragment.
                      Userinfo (e.g. user:password@host) is allowed for proxy
                      authentication. Maximum length is 2048 characters.
                    maxLength: 2048
                    minLength: 1
                    type: string
                    x-kubernetes-validations:
                    - message: httpProxy must be a valid URL
                      rule: isURL(self)
                    - message: httpProxy must use http or https scheme
                      rule: '!isURL(self) || url(self).getScheme() in [''http'', ''https'']'
                    - message: httpProxy must contain a hostname
                      rule: '!isURL(self) || size(url(self).getHostname()) > 0'
                    - message: httpProxy must not contain a path
                      rule: '!isURL(self) || url(self).getEscapedPath() == '''' ||
                        url(self).getEscapedPath() == ''/'''
                    - message: httpProxy must not contain query parameters
                      rule: '!isURL(self) || url(self).getQuery().size() == 0'
                    - message: httpProxy must not contain a fragment
                      rule: '!self.matches(''.*#.*'')'
                  httpsProxy:
                    description: |-
                      httpsProxy is the URL of the proxy for HTTPS requests.
                      Must be a valid URL with http or https scheme, a non-empty
                      hostname, and no path, query parameters, or fragment.
                      Userinfo (e.g. user:password@host) is allowed for proxy
                      authentication. Maximum length is 2048 characters.
                    maxLength: 2048
                    minLength: 1
                    type: string
                    x-kubernetes-validations:
                    - message: httpsProxy must be a valid URL
                      rule: isURL(self)
                    - message: httpsProxy must use http or https scheme
                      rule: '!isURL(self) || url(self).getScheme() in [''http'', ''https'']'
                    - message: httpsProxy must contain a hostname
                      rule: '!isURL(self) || size(url(self).getHostname()) > 0'
                    - message: httpsProxy must not contain a path
                      rule: '!isURL(self) || url(self).getEscapedPath() == '''' ||
                        url(self).getEscapedPath() == ''/'''
                    - message: httpsProxy must not contain query parameters
                      rule: '!isURL(self) || url(self).getQuery().size() == 0'
                    - message: httpsProxy must not contain a fragment
                      rule: '!self.matches(''.*#.*'')'
                  noProxy:
                    description: |-
                      noProxy is a list of hostnames and/or CIDRs and/or IPs for which
                      the proxy should not be used. Must contain at least one entry
                      when set. Each entry must be between 1 and 253 characters long
                      and at most 64 entries are allowed. Duplicate
                      entries are not permitted. Entries that are not valid hostnames,
                      CIDRs, or IPs are silently ignored. Cluster-internal defaults
                      (.cluster.local, .svc, 127.0.0.1, localhost) are always appended
                      automatically and do not need to be included.
                    items:
                      maxLength: 253
                      minLength: 1
                      type: string
                    maxItems: 64
                    minItems: 1
                    type: array
                    x-kubernetes-list-type: set
                  trustedCA:
                    description: |-
                      trustedCA is a reference to a ConfigMap in the openshift-config
                      namespace containing a CA certificate bundle under the key
                      "ca-bundle.crt". This bundle is appended to the system trust store
                      used by authentication components for proxy TLS connections.
                      When omitted, only the system trust store is used.
                    properties:
                      name:
                        description: |-
                          name is the metadata.name of the referenced ConfigMap.
                          Must be a valid DNS subdomain name (RFC 1123): at most 253
                          characters, only lowercase alphanumeric characters, '-' or
                          '.', starting and ending with an alphanumeric character.
                        maxLength: 253
                        minLength: 1
                        type: string
                        x-kubernetes-validations:
                        - message: 'name must be a valid DNS subdomain name: contain
                            no more than 253 characters, contain only lowercase alphanumeric
                            characters, ''-'' or ''.'', and start and end with an
                            alphanumeric character'
                          rule: '!format.dns1123Subdomain().validate(self).hasValue()'
                    required:
                    - name
                    type: object
                type: object
                x-kubernetes-validations:
                - message: at least one of httpProxy or httpsProxy must be specified
                  rule: has(self.httpProxy) || has(self.httpsProxy)
              unsupportedConfigOverrides:
                description: |-
                  unsupportedConfigOverrides overrides the final configuration that was computed by the operator.
                  Red Hat does not support the use of this field.
                  Misuse of this field could lead to unexpected behavior or conflict with other configuration options.
                  Seek guidance from the Red Hat support before using this field.
                  Use of this property blocks cluster upgrades, it must be removed before upgrading your cluster.
                nullable: true
                type: object
                x-kubernetes-preserve-unknown-fields: true
            type: object
          status:
            properties:
              conditions:
                description: conditions is a list of conditions and their status
                items:
                  description: OperatorCondition is just the standard condition fields.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      type: string
                    reason:
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              generations:
                description: generations are used to determine when an item needs
                  to be reconciled or has changed in a way that needs a reaction.
                items:
                  description: GenerationStatus keeps track of the generation for
                    a given resource so that decisions about forced updates can be
                    made.
                  properties:
                    group:
                      description: group is the group of the thing you're tracking
                      type: string
                    hash:
                      description: hash is an optional field set for resources without
                        generation that are content sensitive like secrets and configmaps
                      type: string
                    lastGeneration:
                      description: lastGeneration is the last generation of the workload
                        controller involved
                      format: int64
                      type: integer
                    name:
                      description: name is the name of the thing you're tracking
                      type: string
                    namespace:
                      description: namespace is where the thing you're tracking is
                      type: string
                    resource:
                      description: resource is the resource type of the thing you're
                        tracking
                      type: string
                  required:
                  - group
                  - name
                  - namespace
                  - resource
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - group
                - resource
                - namespace
                - name
                x-kubernetes-list-type: map
              latestAvailableRevision:
                description: latestAvailableRevision is the deploymentID of the most
                  recent deployment
                format: int32
                type: integer
                x-kubernetes-validations:
                - message: must only increase
                  rule: self >= oldSelf
              oauthAPIServer:
                description: oauthAPIServer holds status specific only to oauth-apiserver
                properties:
                  encryptionStatus:
                    description: encryptionStatus contains status reports for the
                      KMS plugin health and its key rotation.
                    minProperties: 1
                    properties:
                      healthReports:
                        description: |-
                          healthReports contains all KMS plugin health reports.
                          When omitted, no health reports are available.
                          Each entry must have a unique combination of nodeName and keyId.
                        items:
                          properties:
                            detail:
                              description: |-
                                detail contains additional error/health information for the respective KMS plugin.
                                When omitted, no additional error or health information is provided.
                                When set, the value must be between 1 and 1024 characters.
                              maxLength: 1024
                              minLength: 1
                              type: string
                            kekId:
                              description: |-
                                kekId refers to the remote KEK id from KMS v2 StatusResponse.key_id.
                                This is not a cryptographic key, but a unique representation of the KEK.
                                The value must be between 1 and 1024 characters.
                              maxLength: 1024
                              minLength: 1
                              type: string
                            keyId:
                              description: |-
                                keyId is the encryption-key-secret id (kms-{keyId}.sock), a unique identifier of the plugin on that node.
                                This is not a cryptographic key used to encrypt/decrypt any resources.
                                The value must be between 1 and 512 characters.
                              maxLength: 512
                              minLength: 1
                              type: string
                            lastCheckedTime:
                              description: lastCheckedTime is a timestamp of when
                                the probe was last checked.
                              format: date-time
                              type: string
                            nodeName:
                              description: |-
                                nodeName is the name of the node this instance of the plugin runs on.
                                The combination of nodeName and keyId makes this health report unique.
                                The value must be a valid Kubernetes node name: a lowercase RFC 1123 subdomain
                                consisting of lowercase alphanumeric characters, '-' or '.', starting and ending with
                                an alphanumeric character, and be at most 253 characters in length.
                              maxLength: 253
                              minLength: 1
                              type: string
                              x-kubernetes-validations:
                              - message: nodeName must be a lowercase RFC 1123 subdomain
                                  consisting of lowercase alphanumeric characters,
                                  '-' or '.', and must start and end with an alphanumeric
                                  character
                                rule: '!format.dns1123Subdomain().validate(self).hasValue()'
                            status:
                              description: |-
                                status contains a health indicator for the respective KMS plugin
                                The field can have three states: healthy, unhealthy, error.
                                With error and unhealthy containing additional information in Detail.
                              enum:
                              - Healthy
                              - Unhealthy
                              - Error
                              type: string
                          required:
                          - kekId
                          - keyId
                          - lastCheckedTime
                          - nodeName
                          - status
                          type: object
                        maxItems: 200
                        minItems: 1
                        type: array
                        x-kubernetes-list-map-keys:
                        - nodeName
                        - keyId
                        x-kubernetes-list-type: map
                      preflight:
                        description: |-
                          preflight contains the state of KMS preflight validation for this operator.
                          The preflight validates the KMS provider configuration before it is used
                          to create a new encryption key, catching configuration issues early such
                          as incorrect login credentials or an unreachable Vault service.
                          When omitted, no preflight validation is in progress.
                        minProperties: 1
                        properties:
                          observedConfigHash:
                            description: |-
                              observedConfigHash is a hash of the KMS provider configuration and
                              its referenced resources that has been observed and requires preflight
                              validation before a new encryption key can be created.
                              The value must be exactly 8 characters.
                            maxLength: 8
                            minLength: 8
                            type: string
                            x-kubernetes-validations:
                            - message: must be a valid base64url encoded value
                              rule: self.matches('^[A-Za-z0-9_-]*={0,2}$')
                          result:
                            description: |-
                              result contains the outcome of the most recent preflight check.
                              Preflight is considered passed when result.status is Succeeded and
                              result.configHash matches observedConfigHash.
                              When omitted, no preflight check result has been reported yet.
                            properties:
                              configHash:
                                description: |-
                                  configHash is the hash of the configuration that was validated.
                                  This is compared against observedConfigHash to confirm the result
                                  corresponds to the current configuration.
                                  The value must be exactly 8 characters.
                                maxLength: 8
                                minLength: 8
                                type: string
                                x-kubernetes-validations:
                                - message: must be a valid base64url encoded value
                                  rule: self.matches('^[A-Za-z0-9_-]*={0,2}$')
                              remoteKeyID:
                                description: |-
                                  remoteKeyID is the remote key encryption key identifier from KMS v2
                                  StatusResponse.key_id. This is not a cryptographic key, but a unique
                                  representation of the remote key used to encrypt data.
                                  The value must be between 1 and 1024 characters.
                                maxLength: 1024
                                minLength: 1
                                type: string
                              status:
                                description: |-
                                  status indicates the outcome of the preflight check.
                                  Succeeded means the KMS plugin responded to Status, Encrypt, and
                                  Decrypt calls successfully.
                                  Failed means the validation did not pass.
                                enum:
                                - Succeeded
                                - Failed
                                type: string
                            required:
                            - configHash
                            - remoteKeyID
                            - status
                            type: object
                        required:
                        - observedConfigHash
                        type: object
                    type: object
                  latestAvailableRevision:
                    description: |-
                      latestAvailableRevision is the latest revision used as suffix of revisioned
                      secrets like encryption-config. A new revision causes a new deployment of pods.
                    format: int32
                    minimum: 0
                    type: integer
                type: object
              observedGeneration:
                description: observedGeneration is the last generation change you've
                  dealt with
                format: int64
                type: integer
              readyReplicas:
                description: readyReplicas indicates how many replicas are ready and
                  at the desired state
                format: int32
                type: integer
              version:
                description: version is the level this availability applies to
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
