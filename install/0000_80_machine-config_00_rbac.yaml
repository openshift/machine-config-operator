apiVersion: v1
kind: ServiceAccount
metadata:
  name: machine-config-operator
  namespace: openshift-machine-config-operator
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/single-node-developer: "true"
---
# Grant the machine-config-operator service account the ability to use the anyuid SCC
# The operator deployment requires anyuid to run with a specific user ID
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: machine-config-operator-anyuid
  annotations:
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
roleRef:
  kind: ClusterRole
  name: system:openshift:scc:anyuid
  apiGroup: rbac.authorization.k8s.io
subjects:
- kind: ServiceAccount
  name: machine-config-operator
  namespace: openshift-machine-config-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: machine-config-operator
  annotations:
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
rules:
# Core API resources
- apiGroups: [""]
  resources: ["configmaps", "secrets", "serviceaccounts"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["nodes"]
  verbs: ["get", "list", "watch"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch", "update"]
# Apps resources - for managing MCO component deployments and daemonsets
- apiGroups: ["apps"]
  resources: ["deployments", "daemonsets"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
- apiGroups: ["apps"]
  resources: ["deployments/scale"]
  verbs: ["get", "update"]
# RBAC resources - for managing roles and bindings for MCO components
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["clusterroles", "clusterrolebindings", "roles", "rolebindings"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
# CustomResourceDefinitions - for checking if CRDs exist
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  verbs: ["get", "list", "watch"]
# MachineConfiguration resources
- apiGroups: ["machineconfiguration.openshift.io"]
  resources: ["machineconfigpools", "machineconfigs", "machineconfignodes"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
- apiGroups: ["machineconfiguration.openshift.io"]
  resources: ["controllerconfigs", "osimagestreams"]
  verbs: ["create", "get", "list", "watch", "update", "patch"]
- apiGroups: ["machineconfiguration.openshift.io"]
  resources: ["osimagestreams/status"]
  verbs: ["update", "patch"]
- apiGroups: ["machineconfiguration.openshift.io"]
  resources: ["kubeletconfigs", "containerruntimeconfigs", "internalreleaseimages", "machineosconfigs", "machineosconfigs/status", "machineosbuilds", "machineosbuilds/status"]
  verbs: ["get", "list", "watch"]
# Config resources - read cluster configuration
- apiGroups: ["config.openshift.io"]
  resources: ["images", "clusterversions", "featuregates", "infrastructures", "networks", "proxies", "dnses", "nodes", "apiservers", "imagedigestmirrorsets", "imagetagmirrorsets", "clusterimagepolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["config.openshift.io"]
  resources: ["clusteroperators"]
  verbs: ["create", "get", "list", "watch"]
- apiGroups: ["config.openshift.io"]
  resources: ["clusteroperators/status"]
  verbs: ["update", "patch"]
# Operator resources
- apiGroups: ["operator.openshift.io"]
  resources: ["imagecontentsourcepolicies"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["operator.openshift.io"]
  resources: ["machineconfigurations"]
  verbs: ["create", "get", "list", "watch", "update", "patch"]
- apiGroups: ["operator.openshift.io"]
  resources: ["machineconfigurations/status"]
  verbs: ["update", "patch"]
# Provisioning CR - for detecting legacy BareMetal provisioning path
- apiGroups: ["metal3.io"]
  resources: ["provisionings"]
  verbs: ["get", "list", "watch"]
# Leader election
- apiGroups: ["coordination.k8s.io"]
  resources: ["leases"]
  verbs: ["create", "get", "list", "watch", "update", "patch"]
# ValidatingAdmissionPolicies - for managing admission control
- apiGroups: ["admissionregistration.k8s.io"]
  resources: ["validatingadmissionpolicies", "validatingadmissionpolicybindings"]
  verbs: ["create", "get", "list", "watch", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: custom-account-openshift-machine-config-operator
  annotations:
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
subjects:
- kind: ServiceAccount
  name: machine-config-operator
  namespace: openshift-machine-config-operator
roleRef:
  kind: ClusterRole
  name: machine-config-operator
  apiGroup: rbac.authorization.k8s.io
---
# Role for accessing metrics exposed by MCD in MCO namepsace
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: prometheus-k8s
  namespace: openshift-machine-config-operator
  annotations:
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
rules:
  - apiGroups:
      - ""
    resources:
      - namespace/metrics
    verbs:
      - get
  - apiGroups:
    - ""
    resources:
    - services
    - endpoints
    - pods
    verbs:
    - get
    - list
    - watch
---
# Grant cluster-monitoring access to MCD metrics in MCO namespace
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: prometheus-k8s
  namespace: openshift-machine-config-operator
  annotations:
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: prometheus-k8s
subjects:
- kind: ServiceAccount
  name: prometheus-k8s
  namespace: openshift-monitoring
---
# Role host-networking-services lets system:node read config maps. This is needed in order to allow
# configuring log level (and in the future more parameters) of static pods deployed in the
# openshift-*-infra namespace.
# Because host networking components right now only run on on-prem platforms, we create RoleBinding
# explicitly only in namespaces for OpenStack, BareMetal, vSphere and Nutanix.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: host-networking-services
  namespace: openshift-openstack-infra
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: host-networking-services
  namespace: openshift-kni-infra
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: host-networking-services
  namespace: openshift-vsphere-infra
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: host-networking-services
  namespace: openshift-nutanix-infra
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: host-networking-system-node
  namespace: openshift-openstack-infra
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:nodes
roleRef:
  kind: Role
  name: host-networking-services

---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: node-credential-providers
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
rules:
  - apiGroups: [""]
    resources: ["serviceaccounts"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["https://kubernetes.default.svc"]
    verbs: ["request-serviceaccounts-token-audience"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: node-credential-providers-binding
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: node-credential-providers
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:nodes
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: host-networking-system-node
  namespace: openshift-kni-infra
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:nodes
roleRef:
  kind: Role
  name: host-networking-services
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: host-networking-system-node
  namespace: openshift-vsphere-infra
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:nodes
roleRef:
  kind: Role
  name: host-networking-services
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: host-networking-system-node
  namespace: openshift-nutanix-infra
  annotations:
    include.release.openshift.io/self-managed-high-availability: "true"
    include.release.openshift.io/single-node-developer: "true"
subjects:
  - apiGroup: rbac.authorization.k8s.io
    kind: Group
    name: system:nodes
roleRef:
  kind: Role
  name: host-networking-services
