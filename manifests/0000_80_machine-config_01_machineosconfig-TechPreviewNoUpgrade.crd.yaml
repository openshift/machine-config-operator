apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.openshift.io: https://github.com/openshift/api/pull/1773
    api.openshift.io/merged-by-featuregates: "true"
    include.release.openshift.io/ibm-cloud-managed: "true"
    include.release.openshift.io/self-managed-high-availability: "true"
    release.openshift.io/feature-set: TechPreviewNoUpgrade
  labels:
    openshift.io/operator-managed: ""
  name: machineosconfigs.machineconfiguration.openshift.io
spec:
  group: machineconfiguration.openshift.io
  names:
    kind: MachineOSConfig
    listKind: MachineOSConfigList
    plural: machineosconfigs
    singular: machineosconfig
  scope: Cluster
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: 'MachineOSConfig describes a build process managed by the MCO
          Compatibility level 4: No compatibility is provided, the API can change
          at any point for any reason. These capabilities should not be used by applications
          needing long term support.'
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation
              of an object. Servers should convert recognized schemas to the latest
              internal value, and may reject unrecognized values. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this
              object represents. Servers may infer this from the endpoint the client
              submits requests to. Cannot be updated. In CamelCase. More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds'
            type: string
          metadata:
            type: object
          spec:
            description: spec describes the configuration of the machineosconfig
            properties:
              buildInputs:
                description: buildInputs is where user options for the build live
                properties:
                  baseImagePullSecret:
                    description: baseImagePullSecret is the secret used to pull the
                      base image.
                    properties:
                      name:
                        description: name is the name of the secret used to push or
                          pull this MachineOSConfig object.
                        type: string
                    required:
                    - name
                    type: object
                  baseOSExtensionsImagePullspec:
                    description: 'baseOSExtensionsImagePullspec is the base Extensions
                      image used in the build process The format of the image pullspec
                      is: host[:port][/namespace]/name@sha256:<digest>'
                    maxLength: 447
                    minLength: 1
                    type: string
                    x-kubernetes-validations:
                    - message: the OCI Image reference must end with a valid '@sha256:<digest>'
                        suffix, where '<digest>' is 64 characters long
                      rule: self.split('@').size() == 2 && self.split('@')[1].matches('^sha256:[a-f0-9]{64}$')
                    - message: the OCI Image name should follow the host[:port][/namespace]/name
                        format, resembling a valid URL without the scheme
                      rule: self.split('@')[0].matches('^([a-zA-Z0-9-]+\\.)+[a-zA-Z0-9-]+(:[0-9]{2,5})?/([a-zA-Z0-9-_]{0,61}/)?[a-zA-Z0-9-_.]*?$')
                  baseOSImagePullspec:
                    description: 'baseOSImagePullspec is the base OSImage we use to
                      build our custom image. The format of the image pullspec is:
                      host[:port][/namespace]/name@sha256:<digest>'
                    maxLength: 447
                    minLength: 1
                    type: string
                    x-kubernetes-validations:
                    - message: the OCI Image reference must end with a valid '@sha256:<digest>'
                        suffix, where '<digest>' is 64 characters long
                      rule: self.split('@').size() == 2 && self.split('@')[1].matches('^sha256:[a-f0-9]{64}$')
                    - message: the OCI Image name should follow the host[:port][/namespace]/name
                        format, resembling a valid URL without the scheme
                      rule: self.split('@')[0].matches('^([a-zA-Z0-9-]+\\.)+[a-zA-Z0-9-]+(:[0-9]{2,5})?/([a-zA-Z0-9-_]{0,61}/)?[a-zA-Z0-9-_.]*?$')
                  containerFile:
                    description: containerFile describes the custom data the user
                      has specified to build into the image.
                    items:
                      description: MachineOSContainerfile contains all custom content
                        the user wants built into the image
                      properties:
                        containerFileArch:
                          default: noArch
                          description: 'containerFileArch describes the architecture
                            this containerfile is to be built for this arch is optional.
                            If the user does not specify an architecture, it is assumed
                            that the content can be applied to all architectures,
                            or in a single arch cluster: the only architecture.'
                          enum:
                          - arm64
                          - amd64
                          - ppc64le
                          - s390x
                          - aarch64
                          - x86_64
                          - noArch
                          type: string
                        content:
                          description: content is the custom content to be built
                          type: string
                      required:
                      - content
                      type: object
                    maxItems: 2
                    minItems: 0
                    type: array
                    x-kubernetes-list-map-keys:
                    - containerFileArch
                    x-kubernetes-list-type: map
                  finalImagePullSecret:
                    description: finalImagePullSecret is the secret used to pull the
                      final produced image. the final image push and pull secrets
                      should be separate for security concerns. If the final image
                      push secret is somehow exfiltrated, that gives someone the power
                      to push images to the image repository. By comparison, if the
                      final image pull secret gets exfiltrated, that only gives someone
                      to pull images from the image repository. It's basically the
                      principle of least permissions. this pull secret will be used
                      on all nodes in the pool. These nodes will need to pull the
                      final OS image and boot into it using rpm-ostree or bootc.
                    properties:
                      name:
                        description: name is the name of the secret used to push or
                          pull this MachineOSConfig object.
                        type: string
                    required:
                    - name
                    type: object
                  finalImagePullspec:
                    description: 'finalImagePullspec describes the location of the
                      final image. The format of the image pullspec is: host[:port][/namespace]/name@sha256:<digest>
                      or host[:port][/namespace]/name:<tag>'
                    maxLength: 447
                    minLength: 1
                    type: string
                    x-kubernetes-validations:
                    - message: the OCI Image reference must end with a valid '@sha256:<digest>'
                        suffix or a valid :<tag>, where '<digest>' and '<tag>' is
                        64 characters long
                      rule: (self.split('@').size() == 2 && self.split('@')[1].matches('^sha256:[a-f0-9]{64}$'))
                        || (self.split(':').size() == 2 && self.split(':')[1].matches('^([a-zA-Z0-9-])+$'))
                    - message: the OCI Image name should follow the host[:port][/namespace]/name
                        format, resembling a valid URL without the scheme
                      rule: (self.split('@').size() == 2 && self.split('@')[0].matches('^([a-zA-Z0-9-]+\\.)+[a-zA-Z0-9-]+(:[0-9]{2,5})?/([a-zA-Z0-9-_]{0,61}/)?[a-zA-Z0-9-_.]*?$'))
                        || (self.split(':').size() == 2 && self.split(':')[0].matches('^([a-zA-Z0-9-]+\\.)+[a-zA-Z0-9-]+(:[0-9]{2,5})?/([a-zA-Z0-9-_]{0,61}/)?[a-zA-Z0-9-_.]*?$'))
                  finalImagePushSecret:
                    description: finalImagePushSecret is the secret used to connect
                      to a user registry. the final image push and pull secrets should
                      be separate for security concerns. If the final image push secret
                      is somehow exfiltrated, that gives someone the power to push
                      images to the image repository. By comparison, if the final
                      image pull secret gets exfiltrated, that only gives someone
                      to pull images from the image repository. It's basically the
                      principle of least permissions. this push secret will be used
                      only by the MachineConfigController pod to push the image to
                      the final destination. Not all nodes will need to push this
                      image, most of them will only need to pull the image in order
                      to use it.
                    properties:
                      name:
                        description: name is the name of the secret used to push or
                          pull this MachineOSConfig object.
                        type: string
                    required:
                    - name
                    type: object
                  imageBuilderType:
                    default: Default
                    description: 'imageBuilderType specifies the backend to be used
                      to build the image. Valid options are: OpenShiftImageBuilder,
                      PodImageBuilder, and Default (OpenShiftImageBuilder)'
                    enum:
                    - Default
                    - OpenShiftImageBuilder
                    - PodImageBuilder
                    type: string
                required:
                - baseImagePullSecret
                - finalImagePullspec
                - finalImagePushSecret
                - imageBuilderType
                type: object
              machineConfigPool:
                description: machineConfigPool is the pool which the build is for
                properties:
                  name:
                    description: name of the MachineConfigPool object.
                    maxLength: 253
                    pattern: ^([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])(\.([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9]))*$
                    type: string
                required:
                - name
                type: object
              rebuild:
                description: rebuild allows the user to manually trigger a rebuild
                properties:
                  maxRetries:
                    default: 3
                    description: maxRetries is the amount of times we want to auto-rebuild
                      after build failures before we deem the update unreconcilable.
                    type: integer
                  rebuildStrategy:
                    default: NoRebuild
                    description: rebuildStrategy is the user provided manual rebuild
                      method of choice
                    enum:
                    - NoRebuild
                    - RebuildNow
                    - RebuildDelayed
                    type: string
                required:
                - maxRetries
                - rebuildStrategy
                type: object
            required:
            - buildInputs
            - machineConfigPool
            - rebuild
            type: object
          status:
            description: status describes the status of the machineosconfig
            properties:
              buildHistory:
                description: buildHistory contains previous iterations of failed,
                  interrupted, or succeded builds related to this config. this will
                  only detail the 3 previous builds associated with the MachineOSConfig.
                items:
                  description: BuildHistory contains information about related builds
                    these builds can be failed, interrupted, or succeeded.
                  properties:
                    buildFailure:
                      description: buildFailure contains an optional message of why
                        this build ended prematurely.
                      type: string
                    buildPod:
                      description: buildPod references the build pod used in this
                        previous build if it existed
                      properties:
                        exitReason:
                          description: exitReason is how the pod exited
                          type: string
                        name:
                          description: name of the build pod used Must be a lowercase
                            RFC-1123 hostname (https://tools.ietf.org/html/rfc1123)
                            It may consist of only alphanumeric characters, hyphens
                            (-) and periods (.) and must be at most 253 characters
                            in length.
                          maxLength: 253
                          pattern: ^([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])(\.([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9]))*$
                          type: string
                      required:
                      - exitReason
                      - name
                      type: object
                    configmaps:
                      description: configMaps references all config map objects created
                        during the build process
                      items:
                        description: BuildConfigMapObjectReference refers to the name
                          and contents of a configmap used in a previous build
                        properties:
                          name:
                            description: name of the configmap
                            maxLength: 253
                            pattern: ^([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9])(\.([a-zA-Z0-9]|[a-zA-Z0-9][a-zA-Z0-9\-]{0,61}[a-zA-Z0-9]))*$
                            type: string
                        required:
                        - name
                        type: object
                      type: array
                      x-kubernetes-list-map-keys:
                      - name
                      x-kubernetes-list-type: map
                    name:
                      description: name is the name of the build
                      type: string
                  required:
                  - name
                  type: object
                maxItems: 3
                type: array
                x-kubernetes-list-map-keys:
                - name
                x-kubernetes-list-type: map
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
