apis:
  - group: machineconfiguration.openshift.io
    kind: MachineConfig
    version: v1
    source: vendor/github.com/openshift/api/machineconfiguration/v1
    enhancement: null
    upstream: false
    description: Declarative OS configuration (Ignition-based)

  - group: machineconfiguration.openshift.io
    kind: MachineConfigPool
    version: v1
    source: vendor/github.com/openshift/api/machineconfiguration/v1
    enhancement: null
    upstream: false
    description: Groups of nodes with shared configuration

  - group: machineconfiguration.openshift.io
    kind: KubeletConfig
    version: v1
    source: vendor/github.com/openshift/api/machineconfiguration/v1
    enhancement: null
    upstream: false
    description: Custom kubelet configuration (wraps Kubernetes KubeletConfiguration)

  - group: machineconfiguration.openshift.io
    kind: ContainerRuntimeConfig
    version: v1
    source: vendor/github.com/openshift/api/machineconfiguration/v1
    enhancement: null
    upstream: false
    description: Custom container runtime (CRI-O) configuration

  - group: machineconfiguration.openshift.io
    kind: ControllerConfig
    version: v1
    source: vendor/github.com/openshift/api/machineconfiguration/v1
    enhancement: null
    upstream: false
    description: Global MCO configuration (internal, generated by MCO)

  - group: config.openshift.io
    kind: ClusterOperator
    version: v1
    source: vendor/github.com/openshift/api/config/v1
    enhancement: null
    upstream: false
    description: Operator status reporting (MCO reports as "machine-config")

  - group: ""
    kind: Node
    version: v1
    upstream: true
    modifications:
      - field: metadata.annotations["machineconfiguration.openshift.io/*"]
        enhancement: null
        description: MCO uses annotations to coordinate updates between MCC and MCD

vendor-dependencies:
  - repo: github.com/openshift/api
    version: "v0.0.0-20260304160726-df03ea1d00f4"
    description: MCO CRD definitions and OpenShift API types
  - repo: github.com/openshift/library-go
    version: "v0.0.0-20260303171201-5d9eb6295ff6"
    description: Operator patterns, utilities, events
  - repo: github.com/openshift/client-go
    version: "v0.0.0-20260302182750-20813ce71ca6"
    description: OpenShift API clients
